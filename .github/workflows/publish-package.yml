name: Publish package to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  pypi:
    runs-on: ${{ matrix.os }}
    environment:
      name: pypi
    permissions:
      id-token: write
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.21"
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Build package
        run: >
          uv build --wheel
          --config-setting=cmake.args="--preset vcpkg"
          --config-setting=cmake.build-type="Release"

      - name: Publish package
        run: uv publish
