name: Lint Python scripts

on: pull_request

jobs:
  ruff:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.21"
          enable-cache: true
          python-version: "3.9"

      - name: Install modCAM
        run: >
          uv sync --all-extras --dev --verbose
          --config-setting=cmake.args="--preset vcpkg"
          --config-setting=cmake.build-type="Release"

      - name: Activate virtual env
        run: source .venv/bin/activate

      - name: Run static analysis
        run: ruff check --output-format=github tests/ tools/scripts/
